<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗 9.5 智能分組實驗</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .video-container { position: relative; overflow: hidden; border-radius: 0.5rem; }
        #camera-video { width: 100%; height: auto; transform: scaleX(-1); /* 鏡像顯示 */ }
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 2px solid #00ff00;
            box-shadow: 0 0 10px rgba(0,255,0,0.5);
            pointer-events: none;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- 預先初始化全域變數，防止載入順序造成的 undefined 錯誤 -->
    <script>
        window.state = window.state || {
            groupId: localStorage.getItem('lab_group_id') || '',
            lastRGB: { r: 0, g: 0, b: 0 }
        };
        // 預設空的 Firebase 函數，等待模組載入後覆寫
        window.setupSync = window.setupSync || function() { console.warn("等待資料庫連線..."); };
        window.addDataToFirebase = window.addDataToFirebase || async function() { console.warn("等待資料庫連線..."); };
    </script>

    <!-- 頂部導航列 -->
    <header class="bg-indigo-700 text-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span>🧪</span> 實驗 9.5 智能滴定數據採集
        </h1>
        <div class="flex items-center gap-4">
            <!-- 顯示目前組別 -->
            <span id="display-group" class="font-bold text-sm px-3 py-1 bg-indigo-900 rounded-full border border-indigo-500">
                尚未分組
            </span>
            <!-- 教師端標記 -->
            <span id="admin-badge" class="hidden font-bold text-sm px-3 py-1 bg-rose-600 rounded-full shadow-lg">
                👑 教師模式
            </span>
            <!-- 右上角的 RGB 顯示區 (新增) -->
            <div id="rgb-display" class="font-mono text-sm bg-black text-green-400 px-3 py-1.5 rounded border border-gray-600 shadow-inner flex items-center gap-2 hidden">
                <div id="live-color-dot" class="w-3 h-3 rounded-full border border-white"></div>
                <span id="rgb-text">R: --- G: --- B: ---</span>
            </div>
        </div>
    </header>

    <!-- 進入實驗室前的設定畫面 (Setup Overlay) -->
    <div id="setup-layer" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center transform scale-100 transition-transform">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">歡迎進入實驗室</h2>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2 text-left" for="input-group">
                    請輸入您的組別編號 (如: G1, G2)
                </label>
                <input id="input-group" type="text" placeholder="例如: G1 (教師請輸入 ADMIN)" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg uppercase transition-shadow">
            </div>
            <button onclick="enterLab()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors text-lg">
                進入實驗
            </button>
        </div>
    </div>

    <!-- 主工作區 -->
    <main class="flex-1 p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 左側：攝影機與數據輸入 -->
        <div class="lg:col-span-1 flex flex-col gap-6">
            
            <!-- 攝影機區塊 -->
            <div class="bg-white p-4 rounded-xl shadow-md border border-gray-200">
                <h3 class="text-lg font-bold text-gray-800 mb-3 border-b pb-2">📹 試管/燒杯色彩偵測</h3>
                <div class="video-container bg-black rounded-lg shadow-inner">
                    <video id="camera-video" autoplay playsinline></video>
                    <div class="target-box"></div>
                </div>
                <!-- 隱藏的 Canvas 用於處理影像像素 -->
                <canvas id="procCanvas" class="hidden" width="20" height="20"></canvas>
                
                <div class="mt-4 grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 text-center">
                        <div class="text-xs text-gray-500 mb-1">偵測顏色</div>
                        <div id="color-patch" class="h-8 w-full rounded shadow-inner border border-gray-300 bg-gray-200 transition-colors"></div>
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-200 text-center">
                        <div class="text-xs text-indigo-500 font-bold mb-1">AI 預估 pH 值</div>
                        <div id="current-ph" class="text-2xl font-black text-indigo-700">--</div>
                    </div>
                </div>
            </div>

            <!-- 數據紀錄區塊 -->
            <div class="bg-white p-5 rounded-xl shadow-md border border-gray-200">
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📝 紀錄滴定數據</h3>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        已加入滴定液體積 (mL)
                    </label>
                    <input id="input-volume" type="number" step="0.1" value="0.0" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg font-mono">
                </div>
                <button onclick="recordDataPoint()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    記錄此點數據
                </button>
            </div>
        </div>

        <!-- 右側：圖表顯示 -->
        <div class="lg:col-span-2 bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex justify-between items-center">
                <span>📈 滴定曲線圖 (pH vs 體積)</span>
                <span id="data-count" class="text-sm font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded">資料筆數: 0</span>
            </h3>
            <div class="flex-1 relative min-h-[400px]">
                <canvas id="titrationChart"></canvas>
            </div>
        </div>

    </main>

    <!-- Firebase 模組載入 (使用 module 避免全域污染) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 從環境變數獲取配置
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'group-lab-95';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // 確保遵守 Rule 3: 驗證優先
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };

            initAuth().then(() => {
                onAuthStateChanged(auth, user => {
                    if (user) {
                        window.firebaseUser = user;

                        // 定義同步函數供外部呼叫
                        window.setupSync = () => {
                            // Rule 1: 嚴格路徑
                            const dataRef = collection(db, 'artifacts', appId, 'public', 'data', 'titration_lab_data');
                            
                            // 監聽資料
                            onSnapshot(dataRef, (snapshot) => {
                                const allData = [];
                                snapshot.forEach(doc => allData.push({ id: doc.id, ...doc.data() }));
                                
                                // Rule 2: 記憶體內過濾 (無複雜查詢)
                                let displayData = allData;
                                if (window.state.groupId !== 'ADMIN') {
                                    displayData = allData.filter(d => d.groupId === window.state.groupId);
                                }
                                
                                // 更新畫面與圖表
                                if (typeof window.updateChartData === 'function') {
                                    window.updateChartData(displayData);
                                }
                            }, (error) => {
                                console.error("Firebase Snapshot Error:", error);
                            });
                        };

                        // 定義寫入函數供外部呼叫
                        window.addDataToFirebase = async (vol, ph, r, g, b) => {
                            if (!window.firebaseUser) return;
                            const dataRef = collection(db, 'artifacts', appId, 'public', 'data', 'titration_lab_data');
                            await addDoc(dataRef, {
                                groupId: window.state.groupId,
                                userId: window.firebaseUser.uid,
                                vol: parseFloat(vol),
                                ph: parseFloat(ph),
                                r: r, g: g, b: b,
                                timestamp: Date.now()
                            });
                        };

                        // 如果在模組載入前，使用者就已經登入或有 GroupID，則啟動同步
                        if (window.state.groupId && document.getElementById('setup-layer').classList.contains('hidden')) {
                            window.setupSync();
                        }
                    }
                });
            }).catch(e => console.error("Firebase Auth Error:", e));

        } catch (error) {
            console.error("Firebase Initialization Error:", error);
        }
    </script>

    <!-- UI 互動與硬體邏輯控制 -->
    <script>
        let chartInstance = null;
        let videoStream = null;

        // --- 初始化功能 ---

        // 處理進入實驗室
        function enterLab() {
            const input = document.getElementById('input-group');
            const gid = input.value.trim().toUpperCase();
            if (!gid) {
                // 簡單的視覺提示取代 alert
                input.classList.add('border-red-500', 'ring-2', 'ring-red-200');
                setTimeout(() => input.classList.remove('border-red-500', 'ring-2', 'ring-red-200'), 1500);
                return;
            }

            window.state.groupId = gid;
            localStorage.setItem('lab_group_id', gid);
            
            // 更新 UI
            document.getElementById('setup-layer').classList.add('opacity-0');
            setTimeout(() => document.getElementById('setup-layer').classList.add('hidden'), 300);
            
            document.getElementById('display-group').innerText = `組別: ${gid}`;
            if (gid === 'ADMIN') {
                document.getElementById('admin-badge').classList.remove('hidden');
            }
            document.getElementById('rgb-display').classList.remove('hidden');

            // 啟動功能
            initChart();
            startCamera();
            
            // 觸發資料同步
            if (typeof window.setupSync === 'function') {
                window.setupSync();
            }
        }

        // 自動檢查先前的登入狀態
        if (window.state.groupId) {
            document.getElementById('input-group').value = window.state.groupId;
            // 延遲一點點自動進入，讓體驗更順暢
            setTimeout(enterLab, 100);
        }

        // --- 攝影機與色彩分析邏輯 ---

        async function startCamera() {
            const video = document.getElementById('camera-video');
            try {
                // 請求後置鏡頭 (如果有的話)
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = videoStream;
                video.onloadedmetadata = () => {
                    video.play();
                    requestAnimationFrame(processVideoFrame);
                };
            } catch (err) {
                console.error("無法存取攝影機: ", err);
                document.getElementById('current-ph').innerText = "相機錯誤";
                document.getElementById('current-ph').classList.add('text-red-500', 'text-sm');
            }
        }

        function processVideoFrame() {
            const video = document.getElementById('camera-video');
            if (!video.videoWidth) {
                requestAnimationFrame(processVideoFrame);
                return;
            }

            const canvas = document.getElementById('procCanvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const size = 20; // 擷取中心 20x20 像素區域來平均

            // 繪製影片中心畫面到隱藏的 canvas (注意鏡像修正)
            ctx.drawImage(video, video.videoWidth / 2 - size / 2, video.videoHeight / 2 - size / 2, size, size, 0, 0, size, size);
            
            const frame = ctx.getImageData(0, 0, size, size);
            const data = frame.data;
            let r = 0, g = 0, b = 0;
            
            for (let i = 0; i < data.length; i += 4) {
                r += data[i];
                g += data[i + 1];
                b += data[i + 2];
            }
            
            const pixelCount = data.length / 4;
            r = Math.round(r / pixelCount);
            g = Math.round(g / pixelCount);
            b = Math.round(b / pixelCount);
            
            window.state.lastRGB = { r, g, b };
            
            // 更新 UI 色彩區塊
            const colorStr = `rgb(${r}, ${g}, ${b})`;
            document.getElementById('color-patch').style.backgroundColor = colorStr;
            
            // 更新右上角的 RGB 數據顯示區塊
            document.getElementById('live-color-dot').style.backgroundColor = colorStr;
            document.getElementById('rgb-text').innerText = `R:${r.toString().padStart(3, '0')} G:${g.toString().padStart(3, '0')} B:${b.toString().padStart(3, '0')}`;
            
            // 估算 pH 值
            const estimatedPH = estimatePH(r, g, b);
            document.getElementById('current-ph').innerText = estimatedPH.toFixed(1);

            // 持續迴圈
            setTimeout(() => requestAnimationFrame(processVideoFrame), 100); // 限制更新頻率降低負載
        }

        // 簡易的色彩映射到 pH 值的演算法 (通用指示劑近似值)
        function estimatePH(r, g, b) {
            // 定義幾個基準點 (可以供日後調整)
            const calibrationMap = [
                { ph: 2.0, r: 230, g: 50,  b: 50  }, // 強酸 (紅)
                { ph: 4.0, r: 240, g: 150, b: 50  }, // 弱酸 (橘紅)
                { ph: 6.0, r: 220, g: 220, b: 50  }, // 微酸 (黃)
                { ph: 7.0, r: 50,  g: 200, b: 50  }, // 中性 (綠)
                { ph: 9.0, r: 50,  g: 150, b: 200 }, // 微鹼 (藍綠)
                { ph: 11.0, r: 50, g: 50,  b: 220 }, // 弱鹼 (藍)
                { ph: 13.0, r: 150, g: 50, b: 200 }  // 強鹼 (紫)
            ];

            let minDistance = Infinity;
            let closestPH = 7.0;

            // 尋找在 RGB 空間中最接近的基準點
            for (const point of calibrationMap) {
                const dist = Math.sqrt(Math.pow(r - point.r, 2) + Math.pow(g - point.g, 2) + Math.pow(b - point.b, 2));
                if (dist < minDistance) {
                    minDistance = dist;
                    closestPH = point.ph;
                }
            }
            
            // 加入一點雜訊平滑，避免數值跳動過快
            return closestPH;
        }


        // --- 圖表與資料記錄邏輯 ---

        function initChart() {
            const ctx = document.getElementById('titrationChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '滴定曲線',
                        data: [],
                        backgroundColor: 'rgba(79, 70, 229, 0.8)', // Indigo
                        borderColor: 'rgba(79, 70, 229, 1)',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        showLine: true, // 散點圖連線
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            title: { display: true, text: '加入滴定液體積 (mL)', font: { size: 14, weight: 'bold' } },
                            min: 0
                        },
                        y: {
                            title: { display: true, text: 'pH 值', font: { size: 14, weight: 'bold' } },
                            min: 0,
                            max: 14
                        }
                    },
                    plugins: {
                        legend: { display: window.state.groupId === 'ADMIN' },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    return `體積: ${ctx.parsed.x} mL, pH: ${ctx.parsed.y.toFixed(2)}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // 供 Firebase 監聽器呼叫以更新圖表
        window.updateChartData = function(dataArray) {
            if (!chartInstance) return;

            document.getElementById('data-count').innerText = `資料筆數: ${dataArray.length}`;

            if (window.state.groupId === 'ADMIN') {
                // 教師模式：將資料依不同群組分開顯示
                const groupMap = {};
                dataArray.forEach(d => {
                    if (!groupMap[d.groupId]) groupMap[d.groupId] = [];
                    groupMap[d.groupId].push({ x: d.vol, y: d.ph, d_vol: d.vol });
                });

                const datasets = [];
                const colors = ['#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#46f0f0', '#f032e6'];
                let cIdx = 0;

                for (const [gid, pts] of Object.entries(groupMap)) {
                    pts.sort((a, b) => a.d_vol - b.d_vol); // 依照體積排序以利畫線
                    datasets.push({
                        label: `組別: ${gid}`,
                        data: pts,
                        backgroundColor: colors[cIdx % colors.length],
                        borderColor: colors[cIdx % colors.length],
                        showLine: true,
                        tension: 0.3
                    });
                    cIdx++;
                }
                chartInstance.data.datasets = datasets;

            } else {
                // 學生模式：只顯示自己的線
                const pts = dataArray.map(d => ({ x: d.vol, y: d.ph })).sort((a, b) => a.x - b.x);
                chartInstance.data.datasets[0].data = pts;
            }

            chartInstance.update();
        };

        // 按鈕點擊：記錄當前點
        function recordDataPoint() {
            const volInput = document.getElementById('input-volume');
            const vol = parseFloat(volInput.value);
            const phStr = document.getElementById('current-ph').innerText;
            const ph = parseFloat(phStr);
            const { r, g, b } = window.state.lastRGB;

            if (isNaN(vol) || isNaN(ph)) return;

            // 視覺回饋按鈕
            const btn = event.currentTarget;
            const ogText = btn.innerHTML;
            btn.innerHTML = "✅ 紀錄成功！";
            btn.classList.add('bg-teal-600');
            setTimeout(() => {
                btn.innerHTML = ogText;
                btn.classList.remove('bg-teal-600');
                // 自動增加體積供下次輸入便利 (預設加 1mL)
                volInput.value = (vol + 1.0).toFixed(1);
            }, 1000);

            // 寫入 Firebase
            if (typeof window.addDataToFirebase === 'function') {
                window.addDataToFirebase(vol, ph, r, g, b);
            }
        }

    </script>
</body>
</html>
