<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 9.5 智能分組實驗平台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化 (由環境提供配置)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'group-lab-95';

        // 全域狀態
        window.state = {
            user: null,
            groupId: localStorage.getItem('lab_group_id') || '',
            points: [],
            isAdmin: false,
            lastRGB: { r: 0, g: 0, b: 0 }
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("驗證錯誤:", e);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.state.user = user;
            if (user && window.state.groupId) {
                setupSync();
            }
        });

        // 核心同步邏輯：根據組別隔離數據
        window.setupSync = () => {
            if (!window.state.user || !window.state.groupId) return;
            
            const groupPath = collection(db, 'artifacts', appId, 'public', 'data', 'measurements');
            
            // 使用錯誤回調防止靜默失敗，並在數據解析時進行過濾
            onSnapshot(groupPath, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => {
                    const item = doc.data();
                    // 強化檢查：確保 item 是有效對象且具有 groupId
                    if (item && typeof item === 'object' && item.groupId) {
                        if (window.state.groupId === 'ADMIN' || item.groupId === window.state.groupId) {
                            data.push(item);
                        }
                    }
                });
                window.state.points = data;
                updateChart();
            }, (error) => {
                console.error("Firestore 同步錯誤:", error);
            });
        };

        // 上傳數據（包含 AI 訓練所需的 RGB 原始資料）
        window.uploadData = async (vol, ph, rgb) => {
            if (!window.state.user || !window.state.groupId) return;
            const timestamp = Date.now();
            const docId = `${window.state.groupId}_${window.state.user.uid}_v${vol}_t${timestamp}`;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'measurements', docId);
            
            try {
                await setDoc(ref, {
                    groupId: window.state.groupId,
                    uid: window.state.user.uid,
                    x: Number(vol),
                    y: Number(ph),
                    r: Number(rgb.r),
                    g: Number(rgb.g),
                    b: Number(rgb.b),
                    timestamp: timestamp
                });
            } catch (e) {
                console.error("數據上傳失敗:", e);
            }
        };

        initAuth();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .camera-box { position: relative; width: 100%; aspect-ratio: 1; border-radius: 2rem; overflow: hidden; border: 4px solid #1e293b; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid white; border-radius: 8px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 登入與組別選擇層 -->
    <div id="setup-layer" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/90 backdrop-blur-sm p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full space-y-6 text-center">
            <div class="text-5xl">🧪</div>
            <h1 class="text-2xl font-black text-slate-800">開始實驗</h1>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">請輸入組別編號</p>
            <input type="text" id="input-group" placeholder="例如: Group-1" class="w-full px-6 py-4 bg-slate-100 rounded-2xl font-black text-center text-xl outline-none focus:ring-4 ring-indigo-500/20 transition-all uppercase">
            <button onclick="enterLab()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:bg-indigo-700 active:scale-95 transition">進入實驗室</button>
            <p class="text-[10px] text-slate-300">管理員請輸入 ADMIN 以開啟監控模式</p>
        </div>
    </div>

    <!-- 主介面 -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 左側：控制與偵測 -->
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-morphism p-6 rounded-[2.5rem] shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span id="display-group" class="px-4 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-black italic">--</span>
                    <button onclick="localStorage.removeItem('lab_group_id'); location.reload();" class="text-slate-400 hover:text-rose-500 transition">退出</button>
                </div>
                
                <div class="camera-box mb-6">
                    <video id="video" autoplay playsinline></video>
                    <div class="crosshair"></div>
                </div>

                <div class="flex justify-between items-end mb-6">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">AI 預測 pH</label>
                        <div id="ph-val" class="text-6xl font-black text-slate-800 italic">--</div>
                    </div>
                    <div id="color-preview" class="w-16 h-16 rounded-2xl border-4 border-white shadow-lg transition-colors duration-300"></div>
                </div>

                <div class="space-y-4">
                    <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center">
                        <span class="text-sm font-bold text-slate-600">加入鹼液體積 (cm³)</span>
                        <div class="flex items-center gap-3">
                            <button onclick="adjVol(-1)" class="w-10 h-10 bg-white shadow rounded-xl font-bold hover:bg-slate-100">-</button>
                            <span id="vol-val" class="text-2xl font-black w-8 text-center">0</span>
                            <button onclick="adjVol(1)" class="w-10 h-10 bg-white shadow rounded-xl font-bold hover:bg-slate-100">+</button>
                        </div>
                    </div>
                    <button onclick="recordAndSync()" class="w-full py-5 bg-slate-800 text-white rounded-3xl font-black text-lg shadow-xl active:scale-95 transition hover:bg-slate-900">
                        紀錄數據並同步
                    </button>
                </div>
            </div>

            <!-- 校準與管理功能 -->
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-4">AI 數據採集輔助</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="calibrate(1)" class="py-2 bg-rose-50 text-rose-600 rounded-xl text-[10px] font-bold">校準 pH 1 (強酸)</button>
                    <button onclick="calibrate(7)" class="py-2 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-bold">校準 pH 7 (中性)</button>
                </div>
                <button id="export-btn" onclick="exportToCSV()" class="w-full mt-4 py-3 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-bold hover:bg-indigo-100 transition">匯出全組數據 (CSV)</button>
            </div>
        </div>

        <!-- 右側：視覺化圖表 -->
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl min-h-[500px] flex flex-col border border-slate-100">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-2xl font-black text-slate-800">實時中和曲線</h2>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Real-time Titration Analysis</p>
                    </div>
                    <div id="admin-badge" class="hidden px-4 py-1 bg-amber-100 text-amber-700 rounded-full text-[10px] font-black italic">管理員模式：監視全班</div>
                </div>
                
                <div class="flex-1 relative">
                    <canvas id="mainChart"></canvas>
                </div>

                <div class="mt-8 p-6 bg-slate-900 rounded-[2rem] text-white space-y-2">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        <h4 class="text-xs font-black uppercase tracking-widest">數據洞察</h4>
                    </div>
                    <p id="insight-text" class="text-sm text-slate-400 leading-relaxed">請輸入第一組數據以開始分析。AI 正在後台監測顏色與 pH 的關聯數據...</p>
                </div>
            </div>
        </div>
    </div>

    <canvas id="procCanvas" class="hidden"></canvas>

    <script>
        let chart;
        let volume = 0;
        let calibrationMap = JSON.parse(localStorage.getItem('ai_calib')) || {
            "1": {r:255, g:50, b:50}, "7": {r:50, g:255, b:50}, "13": {r:50, g:50, b:255}
        };

        function enterLab() {
            const input = document.getElementById('input-group');
            const gid = input ? input.value.trim().toUpperCase() : '';
            if (!gid) return;
            window.state.groupId = gid;
            localStorage.setItem('lab_group_id', gid);
            document.getElementById('setup-layer').classList.add('hidden');
            document.getElementById('display-group').innerText = gid;
            if (gid === 'ADMIN') document.getElementById('admin-badge').classList.remove('hidden');
            
            initChart();
            startCamera();
            window.setupSync();
        }

        if (window.state.groupId) {
            const setupLayer = document.getElementById('setup-layer');
            if (setupLayer) setupLayer.classList.add('hidden');
            const displayGroup = document.getElementById('display-group');
            if (displayGroup) displayGroup.innerText = window.state.groupId;
            if (window.state.groupId === 'ADMIN') {
                const adminBadge = document.getElementById('admin-badge');
                if (adminBadge) adminBadge.classList.remove('hidden');
            }
            setTimeout(() => {
                initChart();
                startCamera();
                window.setupSync();
            }, 500);
        }

        function initChart() {
            const canvas = document.getElementById('mainChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets: [] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { 
                            type: 'linear', min: 0, max: 20, 
                            title: { display: true, text: 'V / cm³', font: { weight: 'bold' } },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        y: { 
                            min: 0, max: 14, 
                            title: { display: true, text: 'pH', font: { weight: 'bold' } },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        }
                    },
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('video');
                if (video) video.srcObject = s;
                requestAnimationFrame(processFrame);
            } catch (e) { console.error("鏡頭開啟失敗:", e); }
        }

        function processFrame() {
            const v = document.getElementById('video');
            const c = document.getElementById('procCanvas');
            if (v && v.readyState === v.HAVE_ENOUGH_DATA && c) {
                const ctx = c.getContext('2d');
                c.width = 40; c.height = 40;
                ctx.drawImage(v, v.videoWidth/2-20, v.videoHeight/2-20, 40, 40, 0, 0, 40, 40);
                const imageData = ctx.getImageData(0,0,40,40);
                const pix = imageData.data;
                let r=0, g=0, b=0;
                for(let i=0; i<pix.length; i+=4) { r+=pix[i]; g+=pix[i+1]; b+=pix[i+2]; }
                window.state.lastRGB = { r: Math.round(r/1600), g: Math.round(g/1600), b: Math.round(b/1600) };
                
                const preview = document.getElementById('color-preview');
                if (preview) preview.style.backgroundColor = `rgb(${window.state.lastRGB.r},${window.state.lastRGB.g},${window.state.lastRGB.b})`;
                
                let minDist = Infinity; let bestPH = 7;
                Object.entries(calibrationMap).forEach(([ph, rgb]) => {
                    const d = Math.sqrt(Math.pow(window.state.lastRGB.r-rgb.r,2)+Math.pow(window.state.lastRGB.g-rgb.g,2)+Math.pow(window.state.lastRGB.b-rgb.b,2));
                    if (d < minDist) { minDist = d; bestPH = parseFloat(ph); }
                });
                const phLabel = document.getElementById('ph-val');
                if (phLabel) phLabel.innerText = bestPH.toFixed(1);
            }
            requestAnimationFrame(processFrame);
        }

        function adjVol(n) { 
            volume = Math.max(0, volume + n); 
            const volLabel = document.getElementById('vol-val');
            if (volLabel) volLabel.innerText = volume; 
        }

        function calibrate(ph) {
            calibrationMap[ph] = { ...window.state.lastRGB };
            localStorage.setItem('ai_calib', JSON.stringify(calibrationMap));
        }

        function recordAndSync() {
            const phLabel = document.getElementById('ph-val');
            const ph = phLabel ? parseFloat(phLabel.innerText) : 7;
            window.uploadData(volume, ph, window.state.lastRGB);
        }

        function updateChart() {
            // 安全守衛：確保 chart 和 points 數組存在
            if (!chart || !window.state.points) return;
            
            const groups = {};
            // 修正處：使用 filter(Boolean) 確保遍歷的每一項都是有效對象
            window.state.points.filter(Boolean).forEach(p => {
                // 再次確認 p 具有 groupId 屬性
                if (p && typeof p === 'object' && p.groupId) {
                    if (!groups[p.groupId]) groups[p.groupId] = [];
                    groups[p.groupId].push(p);
                }
            });

            chart.data.datasets = Object.keys(groups).map(gid => ({
                label: gid,
                data: groups[gid]
                    .filter(item => item && typeof item.x === 'number' && typeof item.y === 'number')
                    .sort((a,b) => a.x - b.x),
                borderColor: gid === window.state.groupId ? '#4f46e5' : '#cbd5e1',
                borderWidth: gid === window.state.groupId ? 4 : 2,
                tension: 0.3,
                pointRadius: 4
            }));
            
            chart.update();

            const myPoints = window.state.points.filter(p => p && p.groupId === window.state.groupId);
            const insightText = document.getElementById('insight-text');
            if (insightText && myPoints.length > 2) {
                const neutralPoint = myPoints.find(p => p.y >= 6.5 && p.y <= 7.5);
                insightText.innerText = neutralPoint 
                    ? `偵測到中和反應發生在 ${neutralPoint.x} cm³ 附近。數據已儲存至雲端供 AI 學習。`
                    : `正在繪製滴定曲線... 當 pH 劇烈跳動時即接近中和點。目前已紀錄 ${myPoints.length} 個點。`;
            }
        }

        function exportToCSV() {
            if (!window.state.points || window.state.points.length === 0) return;
            const headers = "組別,體積(cm3),pH值,R,G,B,時間戳記\n";
            const rows = window.state.points
                .filter(p => p && p.groupId)
                .map(p => 
                    `${p.groupId},${p.x || 0},${p.y || 0},${p.r || 0},${p.g || 0},${p.b || 0},${p.timestamp ? new Date(p.timestamp).toLocaleString() : 'N/A'}`
                ).join("\n");
            
            const blob = new Blob(["\ufeff" + headers + rows], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Titration_Data_${window.state.groupId || 'Export'}.csv`);
            link.click();
        }
    </script>
</body>
</html>
