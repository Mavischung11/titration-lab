<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能滴定實驗系統 Pro - 自定義實驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .video-container { 
            position: relative; 
            overflow: hidden; 
            border-radius: 1.5rem; 
            background: #111; 
            aspect-ratio: 4/3;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        #camera-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        .target-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .target-box {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .mode-active { 
            border-color: #4f46e5 !important; 
            background-color: #eef2ff !important;
            color: #4f46e5 !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }

        .calib-btn {
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .calib-btn:hover {
            border-color: #4f46e5;
            background: #f8fafc;
        }

        @keyframes pulse-soft {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .detecting-indicator {
            animation: pulse-soft 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- 啟動設定遮罩層 -->
    <div id="setup-overlay" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center z-50 p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-lg w-full shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-black text-slate-800">實驗初始化</h1>
                <p class="text-slate-500 mt-1">請設定本次滴定實驗參數</p>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">實驗組別</label>
                        <input id="group-name" type="text" placeholder="G01" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">初始體積 (mL)</label>
                        <input id="start-vol" type="number" step="0.1" value="0.0" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none font-bold">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">滴定管液體 (Titant)</label>
                        <input id="titrant-name" type="text" placeholder="NaOH" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">燒杯液體 (Analyte)</label>
                        <input id="analyte-name" type="text" placeholder="HCl" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none font-bold">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-tighter">初次模式選擇</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="currentMode='auto'; updateSetupUI()" id="setup-btn-auto" class="mode-active border-2 p-4 rounded-2xl flex flex-col items-center transition-all">
                            <span class="text-2xl mb-1">📸</span>
                            <span class="font-bold text-sm">AI 偵測</span>
                        </button>
                        <button onclick="currentMode='manual'; updateSetupUI()" id="setup-btn-manual" class="border-2 border-slate-100 p-4 rounded-2xl flex flex-col items-center transition-all">
                            <span class="text-2xl mb-1">⌨️</span>
                            <span class="font-bold text-sm">手動輸入</span>
                        </button>
                    </div>
                </div>

                <button onclick="initSystem()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl text-lg shadow-xl shadow-indigo-200 transition-all active:scale-95">
                    進入實驗室
                </button>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <main class="max-w-7xl mx-auto p-4 md:p-10">
        <header class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <span class="px-3 py-1 bg-indigo-600 text-white text-[10px] font-black rounded-full uppercase tracking-widest">Smart Titration</span>
                    <h2 class="text-3xl font-black text-slate-800" id="display-title">--- 滴定 ---</h2>
                </div>
                <p id="display-info" class="text-slate-500 font-medium text-lg italic">組別: 未載入</p>
            </div>
            
            <div class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
                <button onclick="toggleMode('auto')" id="nav-btn-auto" class="px-6 py-2 rounded-xl font-bold text-sm transition-all">📸 自動</button>
                <button onclick="toggleMode('manual')" id="nav-btn-manual" class="px-6 py-2 rounded-xl font-bold text-sm transition-all">⌨️ 手動</button>
            </div>

            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-white px-5 py-2.5 rounded-xl shadow-sm border border-slate-200 font-bold text-slate-600 hover:bg-slate-50 text-sm">導出數據</button>
                <button onclick="location.reload()" class="bg-red-50 px-5 py-2.5 rounded-xl border border-red-100 font-bold text-red-600 text-sm">重設</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 左側：數據獲取 -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- AI 視覺面板 -->
                <div id="ai-panel" class="glass-card rounded-[2.5rem] shadow-xl overflow-hidden p-6 border-2 border-white">
                    <div class="video-container mb-4">
                        <video id="camera-video" autoplay playsinline></video>
                        <div class="target-overlay">
                            <div class="target-box"></div>
                        </div>
                    </div>
                    
                    <!-- 校準控制項 -->
                    <div class="mb-6 p-4 bg-slate-900 rounded-2xl text-white">
                        <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-2 h-2 bg-yellow-400 rounded-full"></span> AI 校準助手 (Standard Solution)
                        </p>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="calibrate(4.0)" class="calib-btn bg-slate-800 py-2 rounded-lg text-xs font-bold hover:bg-indigo-600 transition-colors">pH 4.0</button>
                            <button onclick="calibrate(7.0)" class="calib-btn bg-slate-800 py-2 rounded-lg text-xs font-bold hover:bg-indigo-600 transition-colors">pH 7.0</button>
                            <button onclick="calibrate(10.0)" class="calib-btn bg-slate-800 py-2 rounded-lg text-xs font-bold hover:bg-indigo-600 transition-colors">pH 10.0</button>
                        </div>
                        <p id="calib-status" class="text-[9px] mt-2 text-slate-500 text-center italic">提示：放入標準液後點擊對應按鈕</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <p class="text-[10px] font-black text-slate-400 mb-2 uppercase">當前顏色</p>
                            <div id="color-block" class="h-10 w-full rounded-xl shadow-inner border-2 border-white"></div>
                        </div>
                        <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                            <p class="text-[10px] font-black text-indigo-400 mb-2 uppercase tracking-tighter">AI 估計 pH</p>
                            <div id="ai-ph" class="text-3xl font-black text-indigo-600 italic">--</div>
                        </div>
                    </div>
                </div>

                <!-- 記錄控制項 -->
                <div class="glass-card rounded-[2.5rem] shadow-xl p-8 border-2 border-white">
                    <div class="space-y-6">
                        <div>
                            <label id="vol-label" class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">滴定液體積 (mL)</label>
                            <input id="input-vol" type="number" step="0.1" class="w-full px-6 py-5 bg-slate-50 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none text-3xl font-black mono text-indigo-900">
                        </div>
                        
                        <div id="manual-input-box" class="hidden">
                            <label class="block text-[10px] font-black text-emerald-600 mb-2 uppercase tracking-widest">手動輸入 pH 值</label>
                            <input id="input-ph" type="number" step="0.01" placeholder="7.00" class="w-full px-6 py-5 bg-emerald-50 rounded-2xl border-2 border-emerald-100 focus:border-emerald-500 outline-none text-3xl font-black mono text-emerald-900">
                        </div>

                        <button onclick="saveDataPoint()" class="w-full bg-slate-900 hover:bg-black text-white font-black py-6 rounded-[2rem] text-lg transition-all active:scale-95 shadow-xl flex items-center justify-center gap-3">
                            <span>📍</span> 紀錄數據
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右側：圖表 -->
            <div class="lg:col-span-8">
                <div class="glass-card rounded-[3rem] shadow-xl p-8 h-full flex flex-col border-2 border-white min-h-[600px]">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h3 id="chart-title" class="font-black text-2xl text-slate-800 uppercase italic tracking-tighter">Titration Curve</h3>
                            <p id="analyte-label" class="text-slate-400 text-sm">正在滴定...</p>
                        </div>
                        <span id="point-count" class="bg-indigo-600 text-white px-4 py-1.5 rounded-full text-xs font-black">0 POINTS</span>
                    </div>
                    <div class="flex-1 relative">
                        <canvas id="chart-canvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <canvas id="buffer-canvas" width="40" height="40" class="hidden"></canvas>

    <script>
        // --- 狀態變數 ---
        let currentMode = 'auto';
        let chartInstance = null;
        let experimentData = [];
        let videoStream = null;
        
        // 初始設定資料
        let config = {
            group: 'G01',
            titrant: 'NaOH',
            analyte: 'HCl',
            startVol: 0.0
        };

        // 校準點 (使用者可以動態增加)
        let calibrationPoints = [
            { ph: 1.0, r: 230, g: 60, b: 60 },
            { ph: 7.0, r: 100, g: 200, b: 100 },
            { ph: 13.0, r: 160, g: 40, b: 160 }
        ];

        // 當前相機偵測到的 RGB
        let currentRGB = { r: 0, g: 0, b: 0 };

        // --- 初始化功能 ---
        function updateSetupUI() {
            document.getElementById('setup-btn-auto').className = currentMode === 'auto' ? 'mode-active border-2 p-4 rounded-2xl flex flex-col items-center transition-all' : 'border-2 border-slate-100 p-4 rounded-2xl flex flex-col items-center transition-all hover:bg-slate-50';
            document.getElementById('setup-btn-manual').className = currentMode === 'manual' ? 'mode-active border-2 p-4 rounded-2xl flex flex-col items-center transition-all' : 'border-2 border-slate-100 p-4 rounded-2xl flex flex-col items-center transition-all hover:bg-slate-50';
        }

        async function initSystem() {
            config.group = document.getElementById('group-name').value.trim() || '匿名組';
            config.titrant = document.getElementById('titrant-name').value.trim() || 'NaOH';
            config.analyte = document.getElementById('analyte-name').value.trim() || 'HCl';
            config.startVol = parseFloat(document.getElementById('start-vol').value) || 0.0;

            // 更新 UI 顯示
            document.getElementById('display-title').innerText = `${config.titrant} 滴定 ${config.analyte}`;
            document.getElementById('display-info').innerText = `組別: ${config.group.toUpperCase()}`;
            document.getElementById('vol-label').innerText = `${config.titrant} 體積 (mL)`;
            document.getElementById('analyte-label').innerText = `燒杯內液體: ${config.analyte}`;
            document.getElementById('input-vol').value = config.startVol.toFixed(1);
            
            document.getElementById('setup-overlay').style.display = 'none';
            
            initChart();
            toggleMode(currentMode);
        }

        function toggleMode(mode) {
            currentMode = mode;
            
            // 更新導覽列 UI
            document.getElementById('nav-btn-auto').className = mode === 'auto' ? 'bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-md' : 'px-6 py-2 rounded-xl font-bold text-sm text-slate-400 hover:text-slate-600';
            document.getElementById('nav-btn-manual').className = mode === 'manual' ? 'bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-md' : 'px-6 py-2 rounded-xl font-bold text-sm text-slate-400 hover:text-slate-600';

            // 控制面板顯示
            if (mode === 'auto') {
                document.getElementById('ai-panel').style.display = 'block';
                document.getElementById('manual-input-box').style.display = 'none';
                if (!videoStream) startCamera();
            } else {
                document.getElementById('ai-panel').style.display = 'none';
                document.getElementById('manual-input-box').style.display = 'block';
            }
        }

        // --- AI 視覺與校準 ---
        async function startCamera() {
            const video = document.getElementById('camera-video');
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 640, height: 480 } 
                });
                video.srcObject = videoStream;
                processVision();
            } catch (err) {
                console.error("Camera error:", err);
                alert("無法存取相機，請檢查瀏覽器權限。");
            }
        }

        function processVision() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('buffer-canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            const tick = () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const size = 40;
                    ctx.drawImage(video, video.videoWidth/2 - size/2, video.videoHeight/2 - size/2, size, size, 0, 0, size, size);
                    const pixels = ctx.getImageData(0, 0, size, size).data;
                    
                    let r = 0, g = 0, b = 0;
                    for (let i = 0; i < pixels.length; i += 4) {
                        r += pixels[i]; g += pixels[i+1]; b += pixels[i+2];
                    }
                    const count = pixels.length / 4;
                    currentRGB = { r: Math.round(r/count), g: Math.round(g/count), b: Math.round(b/count) };

                    const ph = estimatePH(currentRGB.r, currentRGB.g, currentRGB.b);
                    
                    document.getElementById('color-block').style.backgroundColor = `rgb(${currentRGB.r},${currentRGB.g},${currentRGB.b})`;
                    document.getElementById('ai-ph').innerText = ph.toFixed(2);
                }
                if (currentMode === 'auto') requestAnimationFrame(tick);
                else setTimeout(tick, 500); // 手動模式時背景慢速運行
            };
            tick();
        }

        // 使用 IDW 演算法預測 pH
        function estimatePH(r, g, b) {
            let weightedSum = 0, weightTotal = 0;
            calibrationPoints.forEach(p => {
                const dist = Math.sqrt((r - p.r)**2 + (g - p.g)**2 + (b - p.b)**2);
                const weight = 1 / (Math.pow(dist, 3) + 0.001);
                weightedSum += p.ph * weight;
                weightTotal += weight;
            });
            return weightedSum / weightTotal;
        }

        // 校準功能
        function calibrate(targetPH) {
            // 檢查當前顏色是否有效（非全黑）
            if (currentRGB.r === 0 && currentRGB.g === 0 && currentRGB.b === 0) {
                alert("尚未獲取影像，請確保鏡頭已開啟");
                return;
            }

            // 更新或加入校準點
            const existingIdx = calibrationPoints.findIndex(p => p.ph === targetPH);
            const newPoint = { ph: targetPH, ...currentRGB };
            
            if (existingIdx >= 0) {
                calibrationPoints[existingIdx] = newPoint;
            } else {
                calibrationPoints.push(newPoint);
            }

            // UI 回饋
            const status = document.getElementById('calib-status');
            status.innerText = `✅ 已校準 pH ${targetPH} (R:${newPoint.r} G:${newPoint.g} B:${newPoint.b})`;
            status.classList.remove('text-slate-500');
            status.classList.add('text-green-500', 'font-bold');
            
            setTimeout(() => {
                status.classList.remove('text-green-500', 'font-bold');
                status.classList.add('text-slate-500');
                status.innerText = `校準完成，目前共有 ${calibrationPoints.length} 個參考點`;
            }, 3000);
        }

        // --- 數據與圖表 ---
        function initChart() {
            const ctx = document.getElementById('chart-canvas').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        data: [],
                        showLine: true,
                        borderColor: '#4f46e5',
                        backgroundColor: '#ffffff',
                        borderWidth: 4,
                        pointRadius: 6,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Volume / mL', font: {weight: 'bold'} } },
                        y: { min: 0, max: 14, title: { display: true, text: 'pH', font: {weight: 'bold'} } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function saveDataPoint() {
            const volInput = document.getElementById('input-vol');
            const vol = parseFloat(volInput.value);
            let ph;

            if (currentMode === 'auto') {
                ph = parseFloat(document.getElementById('ai-ph').innerText);
            } else {
                ph = parseFloat(document.getElementById('input-ph').value);
            }

            if (isNaN(vol) || isNaN(ph)) return alert("請輸入有效數值");

            experimentData.push({ x: vol, y: ph });
            experimentData.sort((a, b) => a.x - b.x);

            chartInstance.data.datasets[0].data = experimentData;
            chartInstance.update();

            document.getElementById('point-count').innerText = `${experimentData.length} POINTS`;
            
            // 自動增加 0.5 mL 方便下次輸入
            volInput.value = (vol + 0.5).toFixed(1);
            if (currentMode === 'manual') document.getElementById('input-ph').value = '';
        }

        function exportData() {
            if (experimentData.length === 0) return alert("尚無數據");
            let csv = `Group,${config.group}\nTitrant,${config.titrant}\nAnalyte,${config.analyte}\n\nVolume(mL),pH\n`;
            experimentData.forEach(p => csv += `${p.x},${p.y.toFixed(2)}\n`);
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `滴定實驗_${config.group}_${new Date().getTime()}.csv`;
            a.click();
        }
    </script>
</body>
</html>
